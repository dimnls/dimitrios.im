<!DOCTYPE html>
<html lang="en" style="background:#000;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — Dimitrios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Fragment+Mono&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #000000;
      --surface:     #060606;
      --border:      #0f0f0f;
      --border-mid:  #171717;
      --text:        #d0d0d0;
      --muted:       #3c3c3c;
      --softer:      #686868;
      --accent:      #1ecfea;
      --accent-dim:  rgba(30, 207, 234, 0.06);
      --accent-glow: rgba(30, 207, 234, 0.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; background: #000000; }
    body {
      background: #000000 !important;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }
    body::before {
      content: ''; position: fixed;
      top: -30vh; left: -20vw; width: 70vw; height: 70vh;
      background: radial-gradient(ellipse at center, rgba(30,207,234,0.03) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 0 2rem; background: #000000; }
    header { padding: 16vh 0 0; opacity: 0; animation: rise 1s cubic-bezier(0.16,1,0.3,1) forwards 0.05s; }
    .mono-tag { font-family: 'Fragment Mono', monospace; font-size: 0.62rem; color: var(--accent); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 2.5rem; opacity: 0.7; }
    h1 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(2.5rem, 9vw, 4.5rem); line-height: 1; letter-spacing: -0.025em; color: var(--text); margin-bottom: 0.3em; }
    h1 em { font-style: italic; font-weight: 400; color: var(--accent); }
    .tagline { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(0.85rem, 2vw, 1rem); color: var(--softer); line-height: 1.55; margin-bottom: 4rem; }
    .nav-line { display: flex; align-items: center; gap: 1.75rem; padding: 1.3rem 0; border-top: 1px solid var(--border-mid); border-bottom: 1px solid var(--border-mid); margin-bottom: 9vh; flex-wrap: wrap; opacity: 0; animation: rise 0.8s ease forwards 0.3s; }
    .nav-link { font-family: 'Fragment Mono', monospace; font-size: 0.65rem; color: var(--muted); text-decoration: none; letter-spacing: 0.09em; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--accent); }
    .nav-sep { width: 1px; height: 10px; background: var(--border-mid); }
    .content { padding-bottom: 12vh; }
    .notes-list { display: flex; flex-direction: column; }
    .note {
      padding: 2rem 0;
      border-bottom: 1px solid var(--border-mid);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .note:first-child { border-top: 1px solid var(--border-mid); }
    .note.visible { opacity: 1; transform: translateY(0); }
    .note p { font-size: 1rem; line-height: 1.85; color: var(--text); opacity: 0.75; max-width: 520px; }
    .note p + p { margin-top: 0.75rem; }
    .note em { font-style: italic; color: var(--softer); }
    .note strong { font-weight: 400; color: var(--text); opacity: 1; }
    footer { padding: 2rem 0 4rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-mid); opacity: 0; animation: rise 0.6s ease forwards 0.55s; }
    .footer-text { font-family: 'Fragment Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.07em; }
    .pulse-wrap { display: flex; align-items: center; gap: 0.5rem; font-family: 'Fragment Mono', monospace; font-size: 0.6rem; color: var(--muted); }
    .pulse-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 7px var(--accent-glow); animation: throb 3s ease-in-out infinite; }
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes throb { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.7); } }
    @media (max-width: 480px) { .nav-line { gap: 1.2rem; } }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="mono-tag">dimitrios.im / notes</p>
    <h1><em>Notes.</em></h1>
    <p class="tagline">Thoughts, observations, things worth writing down.</p>
  </header>
  <nav class="nav-line">
    <a class="nav-link active" href="/notes">Notes</a>
    <span class="nav-sep"></span>
    <a class="nav-link" href="/">Home</a>
    <span class="nav-sep"></span>
    <a class="nav-link" href="https://dimnls.bsky.social" target="_blank" rel="noopener">Bluesky</a>
    <span class="nav-sep"></span>
    <a class="nav-link" href="https://approximate.work" target="_blank" rel="noopener">Tools</a>
  </nav>
  <main class="content">
    <div class="notes-list">

      <!-- note: 001 | created: 2026-03-28 | updated: 2026-03-28 -->
      <div class="note">
        <p>Somewhere between the second coffee and the third tab, the answer usually shows up.</p>
      </div>

    </div>
  </main>
  <footer>
    <span class="footer-text">barcelona · greece · © 2026</span>
    <span class="pulse-wrap"><span class="pulse-dot"></span>dimitrios.im</span>
  </footer>
</div>
<script>
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
  }, { threshold: 0.05 });
  document.querySelectorAll('.note').forEach(n => io.observe(n));
</script>
</body>
</html>
